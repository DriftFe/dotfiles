$mainMod = SUPER # Sets "Windows" key as the main modifier

###############################################################################
# 🔒 System Controls
###############################################################################

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Suspend system
bind = ALT+SUPER, S, exec, systemctl suspend

# Exit Hyprland
bind = $mainMod, M, exit,

# Toggle gaming mode
bind = $mainMod, G, exec, ~/.config/hypr/scripts/gaming-mode.sh toggle

###############################################################################
# 💻 Applications
###############################################################################

bind = $mainMod, T, exec, $terminal         # Launch terminal
bind = $mainMod, E, exec, $fileManager      # Launch file manager
bind = $mainMod, A, exec, $menu             # Launch app menu
bind = $mainMod, B, exec, zen-browser       # Launch browser
bind = $mainMod, D, exec, vesktop           # Launch Vesktop (Discord)
bind = $mainMod, K, exec, kdenlive          # Launch Kdenlive
bind = $mainMod, P, exec, powder            # Launch Powder
bind = $mainMod, C, exec, code              # Launch VS Code
bind = $mainMod + CTRL, S, exec, spotify    # Launch Spotify
bind = $mainMod + LSHIFT, A, exec, waydroid-toggle

###############################################################################
# 🪟 Window Management
###############################################################################
bind = $mainMod +  Shift, Q, exec, ~/.config/hypr/scripts/kill-window.sh
bind = $mainMod, Q, killactive,             # Close active window
bind = $mainMod, W, togglefloating,         # Toggle floating mode
bind = $mainMod, J, layoutmsg, togglesplit  # Toggle split layout (dwindle)
bind = $mainMod, left, movefocus, l         # Focus left
bind = $mainMod, right, movefocus, r        # Focus right
bind = $mainMod, up, movefocus, u           # Focus up
bind = $mainMod, down, movefocus, d         # Focus down

# Move window in direction with Alt
bind = Alt, LEFT, movewindow, l
bind = Alt, RIGHT, movewindow, r
bind = Alt, UP, movewindow, u
bind = Alt, DOWN, movewindow, d

###############################################################################
# 🧭 Workspaces
###############################################################################

# Switch to workspace [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
# Toggle special workspace (show/hide)
bind = $mainMod, S, togglespecialworkspace, magic

# Send focused window to special workspace
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Bring focused window out of special workspace and hide the special workspace
bind = $mainMod SHIFT, X, movetoworkspace, e+0
bind = $mainMod SHIFT, X, togglespecialworkspace, magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

###############################################################################
# 🖱️ Mouse Window Management
###############################################################################

# Move and resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###############################################################################
# Emoji
###############################################################################

# Emoji picker
bind = $mainMod, period, exec, ~/.config/hypr/scripts/emoji-picker.sh
bind = $mainMod, R, exec, ~/.config/hypr/scripts/toggle-signal-radar.sh

###############################################################################
# 🌳 Fun & Visuals
###############################################################################

# Bonsai and Cava in two terminals
bind = SUPER, F, exec, kitty -e zsh -c "cbonsai -l --seed=40 -i; exec zsh" & kitty -e zsh -c "cava; exec zsh"

###############################################################################
# 🖼️ Screenshots
###############################################################################

# Area screenshot to clipboard, then edit in Swappy
bind = ALT, S, exec, ~/.config/hypr/scripts/screenshot-swappy.sh clip

# Area screenshot to file and clipboard
bind = CTRL ALT, S, exec, ~/.config/hypr/scripts/screenshot-swappy.sh area-save

# Fullscreen screenshot to file and clipboard
bind = , Print, exec, ~/.config/hypr/scripts/screenshot-swappy.sh screen-save

# Rescue stuck screenshot area selection
bindn = , Escape, exec, ~/.config/hypr/scripts/screenshot-rescue.sh
bind = CTRL ALT, Escape, exec, ~/.config/hypr/scripts/screenshot-rescue.sh

###############################################################################
# 🔊 Audio & Brightness (Hardware Keys)
###############################################################################

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

###############################################################################
# 🎵 Media Controls (Requires `playerctl`)
###############################################################################

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous
